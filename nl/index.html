<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexum. — De transactierail voor de Nederlandse woningmarkt</title>
  <script>
    // Set NL as the user's explicit language preference, then redirect to root.
    // The root page reads this preference via initLanguage() and displays NL.
    try { localStorage.setItem('nexum-lang-override', 'nl'); } catch (e) {}
    window.location.replace('../');
  </script>
</head>
<body></body>
</html>
